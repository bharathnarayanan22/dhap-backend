spring.application.name=dhap
spring.mongodb.uri=${MONGODB_URI}
spring.mongodb.database=${MONGODB_DATABASE:dhap}
spring.mongodb.representation.uuid=standard
spring.data.mongodb.auto-index-creation=true

# Render injects PORT at runtime; default 8080 for local dev
server.port=${PORT:8080}

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Cloudinary SDK auto-reads CLOUDINARY_URL; bound explicitly for clarity
cloudinary.url=${CLOUDINARY_URL}

# Proof photo/video uploads (Spring default is 1MB — too small for phone photos)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
